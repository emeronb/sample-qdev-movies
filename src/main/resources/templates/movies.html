<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Movies This Month - Pirate's Treasure Chest</title>
    <link rel="stylesheet" th:href="@{/css/movies.css}">
    <style>
        /* Pirate-themed search form styles, arrr! */
        .search-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            border: 2px solid rgba(255,193,7,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .search-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(45deg, #ffc107, #f39c12);
        }
        
        .search-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 25px;
            color: #ffc107;
            font-weight: 700;
        }
        
        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            align-items: end;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-label {
            color: #ffc107;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        
        .form-input, .form-select {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #ffc107;
            box-shadow: 0 0 10px rgba(255,193,7,0.3);
            background: rgba(255,255,255,0.15);
        }
        
        .form-input::placeholder {
            color: #ccc;
        }
        
        .form-select option {
            background: #2d2d2d;
            color: #fff;
        }
        
        .search-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            grid-column: 1 / -1;
            margin-top: 20px;
        }
        
        .btn-search {
            background: linear-gradient(45deg, #ffc107, #f39c12);
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,193,7,0.3);
        }
        
        .btn-search:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255,193,7,0.5);
            background: linear-gradient(45deg, #f39c12, #e67e22);
        }
        
        .btn-clear {
            background: linear-gradient(45deg, #6c757d, #495057);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108,117,125,0.3);
        }
        
        .btn-clear:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(108,117,125,0.5);
            background: linear-gradient(45deg, #495057, #343a40);
        }
        
        .search-results-info {
            background: rgba(40,167,69,0.1);
            border: 2px solid rgba(40,167,69,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            color: #28a745;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .search-results-info .pirate-icon {
            font-size: 1.5rem;
            margin-right: 10px;
        }
        
        @media (max-width: 768px) {
            .search-form {
                grid-template-columns: 1fr;
            }
            
            .search-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn-search, .btn-clear {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏴‍☠️ Pirate's Movie Treasure Chest 🏴‍☠️</h1>
        
        <!-- Search Form - Arrr! Find yer movie treasures here! -->
        <div class="search-container">
            <h2 class="search-title">🔍 Search for Movie Treasures, Matey!</h2>
            <form class="search-form" action="/movies/search" method="get">
                <div class="form-group">
                    <label for="movieName" class="form-label">🎬 Movie Name</label>
                    <input type="text" 
                           id="movieName" 
                           name="name" 
                           class="form-input" 
                           placeholder="Enter movie name, ye savvy pirate..."
                           th:value="${param.name}">
                </div>
                
                <div class="form-group">
                    <label for="movieId" class="form-label">🆔 Movie ID</label>
                    <input type="number" 
                           id="movieId" 
                           name="id" 
                           class="form-input" 
                           placeholder="Enter specific movie ID..."
                           min="1"
                           th:value="${param.id}">
                </div>
                
                <div class="form-group">
                    <label for="genre" class="form-label">🎭 Genre</label>
                    <select id="genre" name="genre" class="form-select">
                        <option value="">Select a genre, me hearty...</option>
                        <option th:each="genreOption : ${allGenres}" 
                                th:value="${genreOption}" 
                                th:text="${genreOption}"
                                th:selected="${param.genre != null and param.genre[0] == genreOption}">
                            Genre Option
                        </option>
                    </select>
                </div>
                
                <div class="search-buttons">
                    <button type="submit" class="btn-search">⚓ Search Treasures!</button>
                    <button type="button" class="btn-clear" onclick="clearSearchForm()">🧹 Clear Search</button>
                </div>
            </form>
        </div>
        
        <!-- Search Results Info -->
        <div th:if="${searchResults}" class="search-results-info">
            <span class="pirate-icon">🏴‍☠️</span>
            <span th:text="'Arrr! Found ' + ${searchCount} + ' movie treasures matching yer search: ' + ${searchParams}">
                Search results info
            </span>
        </div>
        
        <!-- Movies Grid -->
        <div class="movies-grid">
            <div class="movie-card" th:each="movie : ${movies}">
                <div class="movie-icon" th:text="${movie.icon}">🎬</div>
                <h3 th:text="${movie.movieName}">Movie Title</h3>
                <div class="movie-details">
                    <p class="director">Director: <span th:text="${movie.director}">Director Name</span></p>
                    <p class="year">Year: <span th:text="${movie.year}">2023</span></p>
                    <p class="genre">Genre: <span th:text="${movie.genre}">Drama</span></p>
                    <p class="duration">Duration: <span th:text="${movie.duration}">120</span> minutes</p>
                </div>
                <div class="rating">
                    <span class="stars">
                        <span th:each="i : ${#numbers.sequence(1, 5)}" 
                              th:text="${i <= movie.imdbRating ? '★' : (i - 0.5 == movie.imdbRating ? '⭐' : '☆')}">★</span>
                    </span>
                    <span class="rating-score" th:text="${#numbers.formatDecimal(movie.imdbRating, 1, 1)} + '/5'">5.0/5</span>
                </div>
                <a th:href="@{/movies/{id}/details(id=${movie.id})}" class="details-btn">View Details</a>
            </div>
        </div>
        
        <!-- Show message if no movies found -->
        <div th:if="${movies.empty}" style="text-align: center; padding: 50px; color: #ccc; font-size: 1.2rem;">
            <div style="font-size: 3rem; margin-bottom: 20px;">🏴‍☠️</div>
            <p>Arrr! No movie treasures in the chest yet, me hearty!</p>
        </div>
    </div>

    <script>
        // JavaScript for clearing the search form, ye savvy?
        function clearSearchForm() {
            document.getElementById('movieName').value = '';
            document.getElementById('movieId').value = '';
            document.getElementById('genre').value = '';
            
            // Navigate back to all movies
            window.location.href = '/movies';
        }
        
        // Auto-focus on the first empty field when page loads
        document.addEventListener('DOMContentLoaded', function() {
            const movieNameInput = document.getElementById('movieName');
            const movieIdInput = document.getElementById('movieId');
            const genreSelect = document.getElementById('genre');
            
            if (!movieNameInput.value && !movieIdInput.value && !genreSelect.value) {
                movieNameInput.focus();
            }
        });
    </script>
</body>
</html>
